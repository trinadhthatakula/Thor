version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "dev"
    groups:
      maven:
        patterns:
          - "*"

  # Keep GitHub Actions versions current/patched (esp. actions used in the
  # keystore-bearing release workflows). Grouped into one weekly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      actions:
        patterns:
          - "*"
