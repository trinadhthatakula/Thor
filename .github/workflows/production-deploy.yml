name: 2. Production Build & Distribute

on:
  push:
    branches: [ "production" ]
  workflow_dispatch:

# Don't let overlapping release runs race on the same version tag / Play upload.
concurrency:
  group: prod-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the release-notes changelog fallback works

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # --- SECRET DECODING ---
      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: Decode Google Play Service Account
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: echo "$PLAY_STORE_JSON_KEY" > app/google-play-api.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- FASTLANE (CLOSED TESTING) ---
      - name: Run Fastlane (Distribute Prod)
        env:
          JSON_KEY_FILE: ${{ github.workspace }}/app/google-play-api.json
          SUPPLY_JSON_KEY: ${{ github.workspace }}/app/google-play-api.json
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_FILE_PATH: ${{ github.workspace }}/app/release.jks
        # Updated to use the production lane (Closed Track)
        run: bundle exec fastlane android distribute_production

      # --- PREPARE RELEASE NOTES ---
      - name: Prepare Release Notes
        id: prep_notes
        run: |
          if [ ! -s version_name.txt ]; then
            echo "Error: version_name.txt is missing or empty!" >&2
            exit 1
          fi
          VERSION_NAME=$(cat version_name.txt)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          
          # Resolve GitHub notes
          GITHUB_NOTES_FILE="release-notes/v${VERSION_NAME}/github.md"
          if [ ! -f "$GITHUB_NOTES_FILE" ]; then
            GITHUB_NOTES_FILE="release-notes/${VERSION_NAME}/github.md"
          fi
          
          if [ -f "$GITHUB_NOTES_FILE" ]; then
            echo "github_notes_path=$GITHUB_NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            # Fallback to generating commit log since the last tag
            FALLBACK_FILE="github_release_notes_fallback.md"
            echo "### Changelog" > "$FALLBACK_FILE"
            echo "" >> "$FALLBACK_FILE"
            
            # Find last tag and get commits
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "Commits since $LAST_TAG:" >> "$FALLBACK_FILE"
              git log "$LAST_TAG..HEAD" --oneline >> "$FALLBACK_FILE"
            else
              echo "Recent commits:" >> "$FALLBACK_FILE"
              git log --oneline -n 20 >> "$FALLBACK_FILE"
            fi
            echo "github_notes_path=$FALLBACK_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep_notes.outputs.version_name }}
          name: Release v${{ steps.prep_notes.outputs.version_name }}
          body_path: ${{ steps.prep_notes.outputs.github_notes_path }}
          files: |
            app/build/distribution/foss/foss-release.apk
            app/build/distribution/store/store-release.apk
            app/build/outputs/bundle/storeRelease/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- SECURITY CLEANUP ---
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f app/release.jks
          rm -f app/google-play-api.json